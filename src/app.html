<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<script>
			window.__bootStartedAt = Date.now();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="format-detection" content="telephone=no, email=no, address=no" />
		<style>
			html,
			body {
				margin: 0;
				min-height: 100%;
				background: #0f0b09;
			}

			body {
				font-family: 'Inter', system-ui, sans-serif;
			}

			.app-shell {
				min-height: 100vh;
				position: relative;
			}

			.boot-splash {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: grid;
				place-items: center;
				background:
					url('/sushi-pattern.svg') center/360px auto repeat,
					radial-gradient(circle at top, rgba(195, 32, 43, 0.16), transparent 38%),
					radial-gradient(circle at bottom, rgba(249, 115, 22, 0.08), transparent 34%),
					linear-gradient(180deg, #140e0b, #0b0706);
				background-blend-mode: soft-light, normal, normal, normal;
				color: #f8f1ea;
				overflow: hidden;
				pointer-events: none;
				opacity: 1;
				visibility: visible;
				transition: opacity 0.55s ease, visibility 0.55s ease;
			}

			body.boot-ready .boot-splash {
				opacity: 0;
				visibility: hidden;
			}

			.boot-splash::before,
			.boot-splash::after {
				content: '';
				position: absolute;
				inset: 0;
				pointer-events: none;
			}

			.boot-splash::before {
				background:
					linear-gradient(90deg, transparent 0, rgba(255, 255, 255, 0.025) 50%, transparent 100%);
				transform: translateX(-100%);
				animation: sweep 1.8s ease-in-out infinite;
			}

			.boot-splash::after {
				background:
					repeating-linear-gradient(
						135deg,
						transparent 0 22px,
						rgba(255, 255, 255, 0.015) 22px 23px
					);
				opacity: 0.55;
			}

			.boot-inner {
				position: relative;
				display: grid;
				justify-items: center;
				gap: 0.45rem;
				padding: 2rem;
				text-align: center;
			}

			.boot-copy {
				display: grid;
				gap: 0;
				justify-items: center;
				order: 1;
			}

			.boot-mark {
				position: relative;
				width: min(260px, 62vw);
				display: grid;
				justify-items: center;
				padding-top: 0.8rem;
				order: 2;
			}

			.boot-knife {
				position: relative;
				z-index: 2;
				width: 88%;
				height: auto;
				filter:
					brightness(0) saturate(100%) invert(91%) sepia(19%) saturate(269%) hue-rotate(326deg) brightness(103%) contrast(95%)
					drop-shadow(0 10px 24px rgba(195, 32, 43, 0.18));
				transform-origin: 12% 76%;
				animation: chop 1.3s ease-in-out infinite;
			}

			.green-onions {
				position: absolute;
				left: 50%;
				bottom: 0.35rem;
				transform: translateX(-50%) rotate(-4deg);
				width: 124px;
				height: 52px;
				z-index: 1;
			}

			.green-onions::before,
			.green-onions::after {
				content: '';
				position: absolute;
				inset: 0;
			}

			.green-onions::before {
				background:
					radial-gradient(circle at 14px 36px, transparent 0 7px, rgba(248, 246, 241, 0.95) 7.6px 10px, transparent 10.8px),
					radial-gradient(circle at 30px 28px, transparent 0 7px, rgba(252, 250, 246, 0.98) 7.6px 10px, transparent 10.8px),
					radial-gradient(circle at 48px 38px, transparent 0 6px, rgba(245, 243, 238, 0.92) 6.6px 9px, transparent 9.8px),
					radial-gradient(circle at 64px 24px, transparent 0 7px, rgba(250, 248, 244, 0.96) 7.6px 10px, transparent 10.8px),
					radial-gradient(circle at 82px 36px, transparent 0 6px, rgba(243, 241, 236, 0.9) 6.6px 9px, transparent 9.8px),
					radial-gradient(circle at 100px 26px, transparent 0 7px, rgba(252, 250, 246, 0.98) 7.6px 10px, transparent 10.8px),
					radial-gradient(circle at 112px 40px, transparent 0 6px, rgba(246, 244, 240, 0.92) 6.6px 9px, transparent 9.8px);
				filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.22));
			}

			.green-onions::after {
				inset: 0;
				background:
					radial-gradient(circle at 22px 18px, transparent 0 5px, rgba(255, 253, 249, 0.9) 5.5px 7.5px, transparent 8.3px),
					radial-gradient(circle at 40px 14px, transparent 0 4px, rgba(252, 250, 246, 0.84) 4.5px 6.3px, transparent 7px),
					radial-gradient(circle at 58px 18px, transparent 0 5px, rgba(255, 253, 249, 0.9) 5.5px 7.5px, transparent 8.3px),
					radial-gradient(circle at 76px 14px, transparent 0 4px, rgba(252, 250, 246, 0.84) 4.5px 6.3px, transparent 7px),
					radial-gradient(circle at 94px 18px, transparent 0 5px, rgba(255, 253, 249, 0.9) 5.5px 7.5px, transparent 8.3px);
				opacity: 0.88;
			}

			.chop-shadow {
				position: absolute;
				left: 40px;
				bottom: 16px;
				width: 154px;
				height: 18px;
				border-radius: 999px;
				background: radial-gradient(circle at center, rgba(0, 0, 0, 0.3), transparent 72%);
				filter: blur(7px);
				opacity: 0.68;
			}

			.boot-logo {
				width: min(260px, 72vw);
				height: auto;
				display: block;
				filter:
					brightness(0) saturate(100%) invert(92%) sepia(23%) saturate(189%) hue-rotate(327deg) brightness(109%) contrast(93%)
					drop-shadow(0 10px 24px rgba(0, 0, 0, 0.24));
			}

			.boot-loader {
				width: 140px;
				height: 3px;
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.1);
				overflow: hidden;
				box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
			}

			.boot-loader::after {
				content: '';
				display: block;
				width: 44%;
				height: 100%;
				border-radius: inherit;
				background: linear-gradient(90deg, rgba(249, 115, 22, 0.8), rgba(195, 32, 43, 0.95));
				animation: load-bar 1.1s ease-in-out infinite;
			}

			@keyframes chop {
				0%,
				100% {
					transform: translate(0, 0) rotate(-24deg);
				}
				35% {
					transform: translate(2px, 14px) rotate(16deg);
				}
				60% {
					transform: translate(1px, 5px) rotate(-8deg);
				}
			}

			@keyframes load-bar {
				0% {
					transform: translateX(-120%);
				}
				100% {
					transform: translateX(320%);
				}
			}

			@keyframes sweep {
				0% {
					transform: translateX(-100%);
				}
				100% {
					transform: translateX(100%);
				}
			}

		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div class="app-shell">
			<div class="boot-splash" aria-hidden="true">
				<div class="boot-inner">
					<div class="boot-mark">
						<div class="chop-shadow"></div>
						<img class="boot-knife" src="/knife-divider.svg" alt="" />
						<div class="green-onions"></div>
					</div>
					<div class="boot-copy">
						<img class="boot-logo" src="/daves-sushi-logo.svg" alt="Dave's Sushi" />
					</div>
					<div class="boot-loader"></div>
				</div>
			</div>
			<div style="display: contents">%sveltekit.body%</div>
		</div>
		<script>
			(function () {
				const MIN_SPLASH_MS = 1800;
				const markReady = () => {
					const startedAt = window.__bootStartedAt || Date.now();
					const elapsed = Date.now() - startedAt;
					const remaining = Math.max(0, MIN_SPLASH_MS - elapsed);
					window.setTimeout(() => {
						document.body.classList.add('boot-ready');
					}, remaining);
				};

				if (document.readyState === 'complete') {
					markReady();
				} else {
					window.addEventListener('load', markReady, { once: true });
				}
			})();
		</script>
	</body>
</html>
